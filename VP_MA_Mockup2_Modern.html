<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VP Maria Anzbach - Mockup 2: Modern Lokal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --blau: #005A9A;
            --gelb: #FFD500;
            --schwarz: #1A1A1A;
            --weiss: #FFFFFF;
            --hellgrau: #F5F5F5;
        }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, var(--blau) 0%, #003d66 100%);
            min-height: 600px;
            position: relative;
            padding: 40px 60px;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><rect fill="%23005A9A" width="1200" height="600"/><circle cx="200" cy="400" r="300" fill="%2300487a" opacity="0.5"/><circle cx="1000" cy="200" r="250" fill="%2300365c" opacity="0.3"/></svg>');
            opacity: 0.3;
        }
        
        /* Navigation */
        .nav {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 100px;
        }
        .nav-logo { color: var(--weiss); font-size: 24px; font-weight: bold; }
        .nav-links { color: var(--weiss); font-size: 14px; }
        .nav-links span { margin-left: 30px; }
        
        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 600px;
        }
        .hero-content h1 {
            font-size: 56px;
            color: var(--weiss);
            line-height: 1.1;
            margin-bottom: 20px;
        }
        .hero-content p {
            font-size: 20px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        .cta-button {
            background: var(--gelb);
            color: var(--schwarz);
            padding: 18px 45px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* Team Section */
        .team {
            background: var(--weiss);
            padding: 80px 60px;
        }
        .team h2 {
            font-size: 32px;
            color: var(--schwarz);
            margin-bottom: 50px;
        }
        .team-grid {
            display: flex;
            gap: 40px;
        }
        .team-member {
            text-align: center;
        }
        .team-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--hellgrau);
            border: 4px solid var(--gelb);
            margin: 0 auto 15px;
        }
        .team-member p { color: var(--schwarz); font-weight: 500; }
    </style>
</head>
<body>
    <section class="hero">
        <nav class="nav">
            <div class="nav-logo">VP Maria Anzbach</div>
            <div class="nav-links">
                <span>Über uns</span>
                <span>Themen</span>
                <span>Veranstaltungen</span>
                <span>Kontakt</span>
            </div>
        </nav>
        <div class="hero-content">
            <h1>Gemeinsam für<br>Maria Anzbach</h1>
            <p>Wir gestalten die Zukunft unserer Gemeinde</p>
            <a href="#" class="cta-button">Jetzt unterstützen</a>
        </div>
    </section>
    
    <section class="team">
        <h2>Unser Team</h2>
        <div class="team-grid">
            <div class="team-member">
                <div class="team-photo"></div>
                <p>Max Mustermann</p>
            </div>
            <div class="team-member">
                <div class="team-photo"></div>
                <p>Anna Beispiel</p>
            </div>
            <div class="team-member">
                <div class="team-photo"></div>
                <p>Peter Muster</p>
            </div>
            <div class="team-member">
                <div class="team-photo"></div>
                <p>Lisa Beispiel</p>
            </div>
        </div>
    </section>
</body>
</html>
